<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الذكية - الوضع الداكن</title>
    <!-- استيراد خط تجوال -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    <!-- استيراد مكتبة Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --border-color: #3b82f6; 
            --text-color: #f1f5f9; 
            --text-title: #60a5fa; 
            --shadow-color: rgba(59, 130, 246, 0.25); 
            --icon-color: #3b82f6; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px;
            max-width: 750px;
            width: 100%;
        }

        @media (min-width: 600px) {
            .grid-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .card-btn {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 22px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-color);
            aspect-ratio: 1 / 1; 
            box-shadow: 0 8px 20px var(--shadow-color); 
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            cursor: pointer;
        }

        .card-btn:hover {
            transform: translateY(-5px);
            border-color: #60a5fa; 
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.6); 
        }

        .card-icon {
            font-size: 2rem;
            color: var(--icon-color);
            margin-bottom: 12px;
            transition: transform 0.25s ease, color 0.25s ease;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.4); 
        }

        .card-btn:hover .card-icon {
            transform: scale(1.12);
            color: #60a5fa; 
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            text-align: center;
            color: var(--text-title);
            letter-spacing: 0.5px;
        }
        
        .card-btn:hover .card-title {
            color: #93c5fd; 
        }
    </style>
</head>
<body>

    <div class="grid-container">
        
        <!-- كارت 1: الصيانة -->
        <a href="maintenance.html" class="card-btn">
            <i class="fa-solid fa-screwdriver-wrench card-icon"></i>
            <div class="card-title">الصيانة</div>
        </a>

        <!-- كارت 2: النواقص -->
        <a href="shortages.html" class="card-btn">
            <i class="fa-solid fa-boxes-empty card-icon"></i>
            <div class="card-title">النواقص</div>
        </a>

        <!-- كارت 3: الأجهزة -->
        <a href="devices.html" class="card-btn">
            <i class="fa-solid fa-mobile-screen-button card-icon"></i>
            <div class="card-title">الأجهزة</div>
        </a>

        <!-- كارت 4: التركيبات -->
        <a href="installations.html" class="card-btn">
            <i class="fa-solid fa-network-wired card-icon"></i>
            <div class="card-title">التركيبات</div>
        </a>

        <!-- كارت 5: التوافقات -->
        <a href="compatibility.html" class="card-btn">
            <i class="fa-solid fa-code-compare card-icon"></i>
            <div class="card-title">التوافقات</div>
        </a>

        <!-- كارت 6: الديون -->
        <a href="debts.html" class="card-btn">
            <i class="fa-solid fa-file-invoice-dollar card-icon"></i>
            <div class="card-title">الديون</div>
        </a>

    </div>

</body>
</html>
