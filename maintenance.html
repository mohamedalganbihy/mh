<meta name='viewport' content='width=device-width, initial-scale=1'/><meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سنترال محمد الجنبيهي - الإدارة الذكية</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-color: #0d6efd; --bg-body: #0a0e17; --customer-color: #ff9999; --card-bg: #1a1d24; --border-color: #2a2e38; --text-light: #eef2ff; }
        body { background-color: var(--bg-body); font-family: 'Segoe UI', system-ui; padding-bottom: 50px; color: var(--text-light); }
        .brand-header { background: linear-gradient(135deg, #0d6efd 0%, #00cec9 100%); color: white; padding: 15px; border-radius: 0 0 20px 20px; display: flex; align-items: center; gap: 15px; }
        .brand-header h1 { font-size: 1.2rem; font-weight: 900; margin: 0; flex-grow: 1; text-align: center; }
        
        .stats-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 10px; }
        .stat-card { background: var(--card-bg); padding: 10px 5px; border-radius: 12px; text-align: center; border: 1px solid var(--border-color); }
        .stat-card .val { font-weight: bold; font-size: 1.1rem; display: block; }
        .stat-card .lbl { font-size: 0.6rem; color: #aaa; }

        .filter-section { background: var(--card-bg); padding: 12px; margin: 0 10px 15px; border-radius: 12px; border: 1px solid var(--border-color); }

        #devContainer { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 0 10px; }
        @media (min-width: 1024px) { #devContainer { grid-template-columns: 1fr 1fr 1fr; } }

        .device-card { background: var(--card-bg); border-radius: 15px; padding: 15px; border-right: 5px solid var(--primary-color); position: relative; }
        .notes-area { background: #00000040; padding: 5px; border-radius: 5px; font-size: 0.75rem; color: #ffeb3b; margin-top: 5px; border: 1px solid #444; }
        .extra-info { font-size: 0.75rem; color: #a29bfe; margin-top: 3px; display: flex; flex-wrap: wrap; gap: 10px; }
        
        .form-control, .form-select { background-color: #2a2e38 !important; border-color: #444 !important; color: #ffffff !important; }
        .form-control::placeholder { color: #888 !important; }
        
        .wa-icon { color: #25d366; font-size: 1.3rem; cursor: pointer; }
        .del-icon { color: #ff5252; font-size: 1.1rem; cursor: pointer; }
        .list-item { background: var(--card-bg); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid #17a2b8; }
        #loading-overlay { position: fixed; inset: 0; background: #0a0e17; display: none; justify-content: center; align-items: center; z-index: 9999; }
        
        .status-unrepairable { background-color: #721c24 !important; color: #f8d7da !important; }
    </style>
</head>
<body>

<div id="loading-overlay"><div class="spinner-border text-primary"></div></div>

<div class="brand-header">
    <button class="btn text-white" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu"><i class="fas fa-bars"></i></button>
    <h1>سنترال محمد الجنبيهي</h1>
</div>

<div class="stats-container">
    <div class="stat-card"><span class="val text-info" id="stat-receive">0</span><span class="lbl">استلام</span></div>
    <div class="stat-card"><span class="val text-warning" id="stat-active">0</span><span class="lbl">قيد العمل</span></div>
    <div class="stat-card"><span class="val text-success" id="stat-ready">0</span><span class="lbl">جاهز</span></div>
    <div class="stat-card"><span class="val text-secondary" id="stat-delivered">0</span><span class="lbl">تم التسليم</span></div>
</div>

<div class="filter-section">
    <div class="row g-2">
        <div class="col-6">
            <input type="text" id="search" class="form-control form-control-sm" placeholder="بحث بالاسم أو الجهاز..." onkeyup="runFilter()">
        </div>
        <div class="col-4">
            <select id="statusFilter" class="form-select form-select-sm" onchange="runFilter()">
                <option value="الكل">كل الحالات</option>
                <option value="جاهز للصيانة">استلام</option>
                <option value="قيد الصيانة">قيد الصيانة</option>
                <option value="انتهى (جاهز)">جاهز للتسليم</option>
                <option value="تم التسليم">تم التسليم</option>
                <option value="قطع غير متوفرة">نواقص</option>
                <option value="غير قابل للصيانة">غير قابل للإصلاح</option>
            </select>
        </div>
        <div class="col-2">
            <button class="btn btn-primary btn-sm w-100" data-bs-toggle="modal" data-bs-target="#addDevModal"><i class="fas fa-plus"></i></button>
        </div>
    </div>
</div>

<div class="offcanvas offcanvas-start bg-dark text-white" id="sidebarMenu">
    <div class="offcanvas-header border-bottom border-secondary"><h5>القائمة</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button></div>
    <div class="offcanvas-body">
        <div class="nav flex-column nav-pills">
            <button class="nav-link active mb-2 text-end" data-bs-toggle="pill" data-bs-target="#tab-1" onclick="closeSidebar()"><i class="fas fa-mobile-alt ms-2"></i> الأجهزة</button>
            <button class="nav-link mb-2 text-end text-white" data-bs-toggle="pill" data-bs-target="#tab-3" onclick="closeSidebar()"><i class="fas fa-shopping-cart ms-2"></i> النواقص</button>
        </div>
    </div>
</div>

<div class="tab-content">
    <div class="tab-pane fade show active" id="tab-1">
        <div id="devContainer"></div>
    </div>
    <div class="tab-pane fade px-2" id="tab-3">
        <h6 class="text-danger mt-2"><i class="fas fa-exclamation-circle"></i> قائمة النواقص</h6>
        <div id="partsContainer"></div>
    </div>
</div>

<div class="modal fade" id="addDevModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered px-3">
        <form class="modal-content" id="devForm">
            <div class="modal-header"><b>تسجيل جهاز</b></div>
            <div class="modal-body">
                <input type="text" id="cName" class="form-control mb-2" placeholder="اسم العميل" required>
                <input type="text" id="dType" class="form-control mb-2" placeholder="نوع الجهاز" required>
                <input type="text" id="dFault" class="form-control mb-2" placeholder="العطل" required>
                <input type="text" id="dImei" class="form-control mb-2" placeholder="رقم الإيمي (IMEI)">
                <input type="text" id="dAccessories" class="form-control mb-2" placeholder="الملحقات المستلمة (مثال: ريموت، شاحن، بدون)">
                <div class="row g-2 mb-2">
                    <div class="col-6">
                        <label class="small text-muted">تاريخ الاستلام:</label>
                        <input type="date" id="dReceiveDate" class="form-control" required>
                    </div>
                    <div class="col-6">
                        <label class="small text-muted">تاريخ التسليم المتوقع:</label>
                        <input type="date" id="dDeliveryDate" class="form-control">
                    </div>
                </div>
                <textarea id="dNotes" class="form-control mb-2" placeholder="ملاحظات فنية..."></textarea>
                <div class="row g-2">
                    <div class="col-6"><input type="number" id="cPhone" class="form-control" placeholder="رقم الموبايل"></div>
                    <div class="col-6"><input type="number" id="dCost" class="form-control" placeholder="التكلفة"></div>
                </div>
            </div>
            <div class="modal-footer p-1"><button type="submit" class="btn btn-primary w-100">حفظ</button></div>
        </form>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered px-3">
        <form class="modal-content" id="editForm">
            <div class="modal-header"><b>تعديل بيانات الجهاز</b></div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <label class="small text-info">اسم العميل:</label>
                <input type="text" id="editCName" class="form-control mb-2">
                <label class="small text-info">رقم الموبايل:</label>
                <input type="number" id="editCPhone" class="form-control mb-2">
                <label class="small text-info">الملحقات:</label>
                <input type="text" id="editAccessories" class="form-control mb-2">
                
                <div class="row g-2 mb-2">
                    <div class="col-6">
                        <label class="small text-info">تاريخ الاستلام:</label>
                        <input type="date" id="editReceiveDate" class="form-control">
                    </div>
                    <div class="col-6">
                        <label class="small text-info">تاريخ التسليم المتوقع:</label>
                        <input type="date" id="editDeliveryDate" class="form-control">
                    </div>
                </div>

                <div class="row g-2 mb-2">
                    <div class="col-6">
                        <label class="small text-info">الحالة:</label>
                        <select id="editStatus" class="form-select">
                            <option value="جاهز للصيانة">استلام</option>
                            <option value="قيد الصيانة">قيد الصيانة</option>
                            <option value="انتهى (جاهز)">انتهى (جاهز)</option>
                            <option value="تم التسليم">تم التسليم</option>
                            <option value="قطع غير متوفرة">قطع غير متوفرة</option>
                            <option value="غير قابل للصيانة">غير قابل للصيانة</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="small text-info">التكلفة:</label>
                        <input type="number" id="editCost" class="form-control">
                    </div>
                </div>
                <label class="small text-info">ملاحظات فنية:</label>
                <textarea id="editNotes" class="form-control"></textarea>
            </div>
            <div class="modal-footer p-1"><button type="submit" class="btn btn-success w-100">حفظ التعديلات</button></div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const DB_URL = "https://repairshop-e2483-default-rtdb.firebaseio.com/"; 

    // لتعبئة تاريخ اليوم تلقائياً عند فتح المودال لإضافة جهاز
    document.getElementById('addDevModal').addEventListener('show.bs.modal', function () {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dReceiveDate').value = today;
    });

    async function api(path, method = "GET", body = null) {
        document.getElementById('loading-overlay').style.display = 'flex';
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(`${DB_URL}${path}.json`, options);
        document.getElementById('loading-overlay').style.display = 'none';
        return res.json();
    }

    async function loadAll() {
        const data = await api("data") || { devices: {}, parts: {} };
        render(data);
        updateStats(data);
        runFilter(); 
    }

    function updateStats(db) {
        const devs = Object.values(db.devices || {});
        document.getElementById('stat-receive').innerText = devs.filter(d => d.status === 'جاهز للصيانة').length;
        document.getElementById('stat-active').innerText = devs.filter(d => d.status === 'قيد الصيانة').length;
        document.getElementById('stat-ready').innerText = devs.filter(d => d.status === 'انتهى (جاهز)').length;
        document.getElementById('stat-delivered').innerText = devs.filter(d => d.status === 'تم التسليم').length;
    }

    function render(db) {
        const devDiv = document.getElementById('devContainer');
        devDiv.innerHTML = '';
        Object.values(db.devices || {}).reverse().forEach(d => {
            let sClass = '';
            switch(d.status) {
                case 'انتهى (جاهز)': sClass = 'bg-success'; break;
                case 'قيد الصيانة': sClass = 'bg-warning text-dark'; break;
                case 'جاهز للصيانة': sClass = 'bg-info'; break;
                case 'قطع غير متوفرة': sClass = 'bg-danger'; break;
                case 'تم التسليم': sClass = 'bg-secondary'; break;
                case 'غير قابل للصيانة': sClass = 'status-unrepairable'; break;
                default: sClass = 'bg-secondary';
            }

            devDiv.innerHTML += `
                <div class="device-card dev-col" data-status="${d.status}" onclick="openEdit('${d.id}')">
                    <div class="d-flex justify-content-between mb-1">
                        <b style="color:var(--customer-color)">${escapeHtml(d.name)}</b>
                        <span class="badge ${sClass}" style="font-size:0.6rem">${d.status}</span>
                    </div>
                    <div class="small text-white-50"><i class="fas fa-mobile-alt"></i> ${escapeHtml(d.type)} | <i class="fas fa-tools"></i> ${escapeHtml(d.fault)}</div>
                    
                    <div class="extra-info">
                        ${d.phone ? `<span><i class="fas fa-phone-alt"></i> ${d.phone}</span>` : ''}
                        ${d.imei ? `<span><i class="fas fa-barcode"></i> ${escapeHtml(d.imei)}</span>` : ''}
                        ${d.accessories ? `<span><i class="fas fa-plug"></i> ملحقات: ${escapeHtml(d.accessories)}</span>` : ''}
                    </div>

                    <div class="extra-info border-top border-secondary pt-1 mt-1 text-white-50" style="font-size: 0.7rem;">
                        ${d.receiveDate ? `<span><i class="fas fa-calendar-plus text-info"></i> استلام: ${d.receiveDate}</span>` : ''}
                        ${d.deliveryDate ? `<span><i class="fas fa-calendar-check text-success"></i> تسليم: ${d.deliveryDate}</span>` : ''}
                    </div>

                    ${d.notes ? `<div class="notes-area"><b>ملاحظة:</b> ${escapeHtml(d.notes)}</div>` : ''}
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span class="fw-bold text-white">${d.cost || 0} ج.م</span>
                        <div>
                            <i class="fab fa-whatsapp wa-icon me-2" onclick="event.stopPropagation(); sendWA('${d.phone}','${d.name}','${d.status}')"></i>
                            <i class="fas fa-trash-alt del-icon" onclick="event.stopPropagation(); deleteItem('devices/${d.id}')"></i>
                        </div>
                    </div>
                </div>`;
        });

        const partsCont = document.getElementById('partsContainer');
        partsCont.innerHTML = '';
        Object.values(db.parts || {}).forEach(p => {
            partsCont.innerHTML += `<div class="list-item"><div><b>${escapeHtml(p.name)}</b><br><small class="text-info">لجهاز: ${escapeHtml(p.devInfo)}</small></div><i class="fas fa-check-circle text-success fs-4" onclick="resolvePart('${p.id}', '${p.deviceId}')"></i></div>`;
        });
    }

    function runFilter() {
        let searchText = document.getElementById('search').value.toLowerCase();
        let statusValue = document.getElementById('statusFilter').value;
        
        document.querySelectorAll('.dev-col').forEach(card => {
            let textMatch = card.innerText.toLowerCase().includes(searchText);
            let statusMatch = (statusValue === "الكل" || card.getAttribute('data-status') === statusValue);
            
            card.style.display = (textMatch && statusMatch) ? 'block' : 'none';
        });
    }

    document.getElementById('devForm').onsubmit = async function(e) {
        e.preventDefault();
        const id = "ID" + Date.now();
        await api(`data/devices/${id}`, "PUT", {
            id, name: document.getElementById('cName').value, phone: document.getElementById('cPhone').value,
            type: document.getElementById('dType').value, imei: document.getElementById('dImei').value,
            fault: document.getElementById('dFault').value, notes: document.getElementById('dNotes').value,
            cost: document.getElementById('dCost').value, status: 'جاهز للصيانة',
            accessories: document.getElementById('dAccessories').value,
            receiveDate: document.getElementById('dReceiveDate').value,
            deliveryDate: document.getElementById('dDeliveryDate').value
        });
        bootstrap.Modal.getInstance(document.getElementById('addDevModal')).hide();
        this.reset(); loadAll();
    };

    async function openEdit(id) {
        const d = await api(`data/devices/${id}`);
        document.getElementById('editId').value = id;
        document.getElementById('editCName').value = d.name || '';
        document.getElementById('editCPhone').value = d.phone || '';
        document.getElementById('editStatus').value = d.status || 'جاهز للصيانة';
        document.getElementById('editCost').value = d.cost || 0;
        document.getElementById('editNotes').value = d.notes || '';
        document.getElementById('editAccessories').value = d.accessories || '';
        document.getElementById('editReceiveDate').value = d.receiveDate || '';
        document.getElementById('editDeliveryDate').value = d.deliveryDate || '';
        new bootstrap.Modal(document.getElementById('editModal')).show();
    }

    document.getElementById('editForm').onsubmit = async function(e) {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const status = document.getElementById('editStatus').value;
        
        if (status === "قطع غير متوفرة") {
            let partName = prompt("ما هي القطعة الناقصة؟");
            if (partName) {
                const pId = "PART" + Date.now();
                const devData = await api(`data/devices/${id}`);
                await api(`data/parts/${pId}`, "PUT", { id: pId, deviceId: id, name: partName, devInfo: `${devData.name} - ${devData.type}` });
            }
        }
        await api(`data/devices/${id}`, "PATCH", { 
            name: document.getElementById('editCName').value, phone: document.getElementById('editCPhone').value,
            status: status, cost: document.getElementById('editCost').value, notes: document.getElementById('editNotes').value,
            accessories: document.getElementById('editAccessories').value,
            receiveDate: document.getElementById('editReceiveDate').value,
            deliveryDate: document.getElementById('editDeliveryDate').value
        });
        bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
        loadAll();
    };

    async function resolvePart(partId, deviceId) {
        if(confirm("هل تم توفير القطعة؟")) {
            await api(`data/parts/${partId}`, "DELETE");
            await api(`data/devices/${deviceId}`, "PATCH", { status: "قيد الصيانة" });
            loadAll();
        }
    }

    async function deleteItem(path) { if(confirm('حذف نهائي؟')) { await api(`data/${path}`, "DELETE"); loadAll(); } }
    function sendWA(p,n,s) { if(!p) return alert("لا يوجد رقم"); window.open(`https://wa.me/20${p}?text=أهلاً أ/ ${n}, حالة جهازك الآن: ${s}`); }
    function escapeHtml(str) { return str ? str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) : ''; }
    function closeSidebar() { bootstrap.Offcanvas.getInstance(document.getElementById('sidebarMenu'))?.hide(); }

    loadAll();
</script>
</body>
</html>
